<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" width="780" height="220">
  <defs>
    <radialGradient id="headGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FF7A35"/>
      <stop offset="100%" stop-color="#CC4E00"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3D2200"/>
      <stop offset="100%" stop-color="#0A0500"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="220" rx="12" fill="#0d1b2a"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.15"/>
  </pattern>
  <rect width="780" height="220" rx="12" fill="url(#grid)"/>

  <!-- Red divider accent -->
  <line x1="248" y1="25" x2="248" y2="195" stroke="#c0392b" stroke-width="2" opacity="0.8"/>

  <!-- ═══ FOX ═══ -->

  <!-- Tail curling behind on left -->
  <path d="M 42,195 Q 8,155 18,110 Q 28,72 58,80 Q 48,100 52,130 Q 56,162 88,175 Q 70,178 42,195 Z"
        fill="#CC4E00" opacity="0.75"/>
  <path d="M 50,190 Q 20,158 28,118 Q 36,84 56,90 Q 46,110 50,138 Q 54,165 82,175 Q 64,177 50,190 Z"
        fill="#F5DFC0" opacity="0.55"/>

  <!-- Left ear outer -->
  <polygon points="80.6,84.7 110.0,66.0 76,22" fill="#CC4E00"/>

  <!-- Right ear outer -->
  <polygon points="140.0,66.0 169.4,84.7 174,22" fill="#CC4E00"/>

  <!-- Head circle (drawn before inner ears so ears sit on top) -->
  <circle cx="125" cy="122" r="58" fill="url(#headGrad)"/>

  <!-- Left ear inner -->
  <polygon points="85,80 108,69 82,34" fill="#FFB07A"/>

  <!-- Right ear inner -->
  <polygon points="142,69 165,80 168,34" fill="#FFB07A"/>

  <!-- White/cream lower face -->
  <ellipse cx="125" cy="143" rx="37" ry="27" fill="#FFE4C4"/>

  <!-- Dark eye shadow patches (classic fox marking) -->
  <ellipse cx="104" cy="112" rx="17" ry="15" fill="#A83800" opacity="0.55"/>
  <ellipse cx="146" cy="112" rx="17" ry="15" fill="#A83800" opacity="0.55"/>

  <!-- Eyes -->
  <ellipse cx="104" cy="112" rx="11" ry="12" fill="url(#eyeGrad)"/>
  <ellipse cx="146" cy="112" rx="11" ry="12" fill="url(#eyeGrad)"/>

  <!-- Pupils (slightly amber — fox eyes) -->
  <ellipse cx="104" cy="113" rx="5" ry="8" fill="#1A0800"/>
  <ellipse cx="146" cy="113" rx="5" ry="8" fill="#1A0800"/>

  <!-- Eye shine -->
  <circle cx="100" cy="108" r="3.2" fill="white" opacity="0.85"/>
  <circle cx="142" cy="108" r="3.2" fill="white" opacity="0.85"/>

  <!-- Nose -->
  <path d="M 118,138 Q 125,133 132,138 Q 128,145 125,144 Q 122,145 118,138 Z" fill="#1A0800"/>

  <!-- Whisker dots -->
  <circle cx="100" cy="148" r="2" fill="#C04A10" opacity="0.6"/>
  <circle cx="107" cy="153" r="2" fill="#C04A10" opacity="0.6"/>
  <circle cx="100" cy="158" r="2" fill="#C04A10" opacity="0.6"/>
  <circle cx="150" cy="148" r="2" fill="#C04A10" opacity="0.6"/>
  <circle cx="143" cy="153" r="2" fill="#C04A10" opacity="0.6"/>
  <circle cx="150" cy="158" r="2" fill="#C04A10" opacity="0.6"/>

  <!-- ═══ TEXT ═══ -->

  <!-- JAXEN wordmark -->
  <text x="272" y="147"
        font-family="'Courier New', Courier, monospace"
        font-size="86"
        fill="white"
        font-weight="bold"
        letter-spacing="7"
        filter="url(#glow)">JAXEN</text>

  <!-- Tagline -->
  <text x="276" y="178"
        font-family="'Courier New', Courier, monospace"
        font-size="14"
        fill="#c0392b"
        letter-spacing="5.5"
        font-weight="600">RECON PLATFORM</text>
</svg>
